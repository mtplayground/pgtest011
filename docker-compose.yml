services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: pgtest011
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pgtest011"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: docker
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: pgtest011=info,tower_http=info,axum::rejection=trace
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pgtest011
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
